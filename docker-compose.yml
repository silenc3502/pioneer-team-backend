services:
  fastapi:
    image: ghcr.io/${REPO_USER}/pioneer-team-backend:latest
    container_name: pioneer-team-backend
    ports:
      - "33333:33333"
    env_file:
      - .env
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - pioneer-team-net

  mysql:
    image: mysql:8.1
    container_name: pioneer-team-backend-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - pioneer-team-net

volumes:
  mysql_data:

networks:
  pioneer-team-net:
    driver: bridge
